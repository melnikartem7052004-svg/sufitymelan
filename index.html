<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sufity Melan | Sufity Napinane Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
height:70px;
}

nav a{
color:white;
text-decoration:none;
margin-left:30px;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#00AEEF;
}

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
url("hero.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:0 8%;
}

.hero-content{
max-width:700px;
}

.hero h1{
font-size:65px;
line-height:1.1;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#d9d9d9;
margin-bottom:35px;
}

.btns{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:16px 35px;
border-radius:50px;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.call{
background:#00AEEF;
color:white;
}

.quote{
border:2px solid #00AEEF;
color:white;
}

.call:hover,
.quote:hover{
transform:translateY(-3px);
}

section{
padding:100px 8%;
}

.section-title{
text-align:center;
font-size:45px;
margin-bottom:60px;
}

.calculator{
max-width:800px;
margin:auto;
background:#111;
padding:40px;
border-radius:25px;
border:1px solid #1f1f1f;
}

.calculator select,
.calculator input{
width:100%;
padding:18px;
margin-top:15px;
margin-bottom:25px;
background:#181818;
border:none;
color:white;
border-radius:12px;
font-size:16px;
}

.result{
font-size:28px;
font-weight:700;
text-align:center;
color:#00AEEF;
margin-top:20px;
}

</style>
</head>

<body>

<header>

<img src="logo.png" class="logo">

<nav>
<a href="#realizacje">Realizacje</a>
<a href="#kalkulator">Kalkulator</a>
<a href="#kontakt">Kontakt</a>
</nav>

</header>

<section class="hero">

<div class="hero-content">

<h1>Nowoczesne Sufity Napinane Premium</h1>

<p>
Profesjonalny montaż sufitów napinanych,
linii LED i torów magnetycznych.
Darmowa wycena w 24h.
</p>

<div class="btns">

<a href="tel:+48734625102" class="btn call">
📞 Zadzwoń teraz
</a>

<a href="#formularz" class="btn quote">
📋 Otrzymaj bezpłatną wycenę
</a>

</div>

</div>

</section>

<section id="kalkulator">

<h2 class="section-title">
Oblicz koszt sufitu
</h2>

<div class="calculator">

<select id="typ">
<option value="120">Matowy</option>
<option value="140">Błyszczący</option>
<option value="180">Linie LED</option>
<option value="220">Tory magnetyczne</option>
</select>

<input
type="number"
id="metry"
placeholder="Podaj ilość m²"
>

<div class="result" id="wynik">
0 zł
</div>

</div>

</section>

<script>

const typ = document.getElementById('typ');
const metry = document.getElementById('metry');
const wynik = document.getElementById('wynik');

function licz(){

const cena = Number(typ.value);
const m2 = Number(metry.value);

wynik.innerHTML =
(m2*cena).toLocaleString() + " zł";

}

typ.addEventListener('change',licz);
metry.addEventListener('input',licz);

</script>

</body>
</html>
