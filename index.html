<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sufity Melan | Nowoczesne Sufity Napinane</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#f8f9fb;
color:#222;
line-height:1.6;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(255,255,255,.95);
backdrop-filter:blur(10px);
padding:15px 0;
box-shadow:0 2px 20px rgba(0,0,0,.08);
z-index:999;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:32px;
font-weight:900;
color:#0066ff;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url('IMG_1811.jpeg');
background-size:cover;
background-position:center;
color:white;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:24px;
margin-bottom:25px;
}

.price{
font-size:38px;
font-weight:800;
color:#4ea1ff;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:16px 35px;
border-radius:12px;
font-weight:bold;
text-decoration:none;
margin:8px;
transition:.3s;
}

.btn-call{
background:#0066ff;
color:white;
}

.btn-wa{
background:#25D366;
color:white;
}

.btn:hover{
transform:translateY(-3px);
}

section{
padding:100px 20px;
}

.title{
text-align:center;
font-size:48px;
margin-bottom:50px;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
text-align:center;
}

.card h3{
margin-bottom:15px;
font-size:24px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:320px;
object-fit:cover;
border-radius:15px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.04);
}

.calculator{
max-width:700px;
margin:auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.calculator input{
width:100%;
padding:18px;
border:1px solid #ddd;
border-radius:12px;
font-size:18px;
margin-bottom:20px;
}

.calculator button{
width:100%;
padding:18px;
border:none;
background:#0066ff;
color:white;
font-size:20px;
border-radius:12px;
cursor:pointer;
}

.result{
text-align:center;
font-size:32px;
font-weight:bold;
margin-top:25px;
color:#0066ff;
}

.contact{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
max-width:800px;
margin:auto;
text-align:center;
}

.contact p{
font-size:22px;
margin:15px 0;
}

footer{
background:#111;
color:white;
text-align:center;
padding:40px;
}

@media(max-width:768px){

.hero h1{
font-size:38px;
}

.title{
font-size:34px;
}

.hero p{
font-size:18px;
}

}

</style>
</head>

<body>

<header>
<div class="container nav">
<div class="logo">SUFITY MELAN</div>
</div>
</header>

<section class="hero">
<div>
<h1>Nowoczesne Sufity Napinane</h1>
<p>Warszawa i woj. mazowieckie</p>
<div class="price">Od 120 zł/m²</div>

<a href="tel:+48734625102" class="btn btn-call">
📞 Zadzwoń
</a>

<a href="https://wa.me/48734625102" class="btn btn-wa">
WhatsApp
</a>

</div>
</section>
